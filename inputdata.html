<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data Mahasiswa</title>
</head>
<body>
    <h2>Tambah Data Mahasiswa</h2>
    <form action="mahasiswa.html" method="post">
        <table cellpadding="5px">
            <tr>
                <td><label for="nama">Nama</label></td>
                <td>:</td>
                <td><input type="text" nana="nama" id="nama"/></td>
            </tr>
                        <tr>
                <td><label for="nim">NIM</label></td>
                <td>:</td>
                <td><input type="text" nana="nim" id="nim"/></td>
            </tr>
            <tr>
                <td><label for="foto">foto</label></td>
                <td>:</td>
                <td><input type="file" nana="foto" id="foto"/></td>
            </tr>
            <tr>
                <td><label for="uts">UTS</label></td>
                <td>:</td>
                <td><input type="number" nana="uts" id="uts"/></td>
            </tr>
            <tr>
                <td><label for="uas">UAS</label></td>
                <td>:</td>
                <td><input type="number" nana="uas" id="uas"/></td>
            </tr>
            <tr>
                <td><label for="tugas">Tugas</label></td>
                <td>:</td>
                <td><input type="number" nana="tugas" id="tugas"/></td>
            </tr>
        </table>
        <button type="submit" name="submit" id="submit">Tambah Data</button>
    
    
    </form>
</body>
</html>
